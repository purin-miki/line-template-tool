<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>新規受講生対応テンプレ</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    input, select, textarea { width: 100%; margin-top: 5px; margin-bottom: 15px; padding: 8px; }
    button { padding: 10px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    .box { background: white; padding: 20px; border-radius: 10px; }
  </style>
</head>
<body>

<div class="box">
  <h2>新規受講生対応テンプレ</h2>

<label>名前</label> <input id="name" placeholder="例：山田">

<label>テンプレ選択</label> <select id="type"> <option value="1">① 初回案内</option> <option value="2">② 視聴完了＋開始日</option> <option value="3">③ 前日案内</option> <option value="4">④ 前日＋視聴完了</option> </select>

<label>開始日</label> <input id="date" type="date">

<label>学習管理シートURL</label> <input id="url">

<label><input type="checkbox" id="miki"> Mikiさん経由</label><br> <label><input type="checkbox" id="session"> セッション予約済</label><br> <label><input type="checkbox" id="sign"> 署名を入れる</label>

  <input id="signName" placeholder="署名名">

<button onclick="generate()">作成</button>

  <h3>結果</h3>
  <textarea id="result" rows="15"></textarea>

</div>

<script>
function generate() {
  let name = document.getElementById("name").value || "〇〇";
  let type = document.getElementById("type").value;
  let date = document.getElementById("date").value;
  let url = document.getElementById("url").value;
  let miki = document.getElementById("miki").checked;
  let session = document.getElementById("session").checked;
  let sign = document.getElementById("sign").checked;
  let signName = document.getElementById("signName").value;

  let text = "";

  if(type == "1"){
    text = `${name}さん、ありがとうございます！
受講開始のサポートをさせていただくサポートチームです😊
今後の流れをご案内いたしますね！

ーーーーーーーーー
1️⃣受講生用ポータルサイトに入る
▼
https://portal.masaenglishcompany.com/

2️⃣1番上の「プログラム開始」ボタンをタップし、
6つのステップをご確認ください

3️⃣受講開始日をLINEでご連絡ください
すべてのステップをご確認後、
ご不明点がなければ、以下の内容をお送りください🙏

ーーーーーーーーー
・全部視聴しました！
・受講開始日（〇月〇日）
ーーーーーーーーー

（※最短で明日から開始可能です）

どうぞよろしくお願いいたします😊`;`;
    }
  }

  if(type == "2"){
    text = `${name}さん、ご連絡ありがとうございます！
受講開始日（${date}）承知しました！

教材確認をお願いします！`;
  }

  if(type == "3"){
    text = `${name}さん、明日から開始ですね！

学習管理シートはこちら
${url}`;
  }

  if(type == "4"){
    text = `${name}さん、ご連絡ありがとうございます！
受講開始日（${date}）承知しました！

教材確認お願いします！

学習管理シートはこちら
${url}`;
  }

  if(session){
    text += `

セッション前に教材確認お願いします！`;
  }

  if(sign && signName){
    text += `

${signName}`;
  }

  document.getElementById("result").value = text;
}
</script>

</body>
</html>
